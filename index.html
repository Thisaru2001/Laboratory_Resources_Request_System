<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In – Microbiology Lab System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f766e, #0d9488);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
        }
        .lab-title {
            color: #0f766e;
        }
    </style>
</head>
<body>

<div class="card shadow login-card">
    <div class="card-body p-4">

        <div class="text-center mb-4">
            <h4 class="lab-title fw-bold">Microbiology Lab System</h4>
            <p class="text-muted">Head of Department / Admin Login</p>
        </div>

        <form method="post" action="login.php">

            <div class="mb-3">
                <label class="form-label">Username / Email</label>
                <input type="text" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password" required>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-success">
                    Sign In
                </button>
            </div>

            <div class="text-center">
                <small class="text-muted">
                    Authorized access only
                </small>
            </div>

        </form>

    </div>
</div>

</body>
</html>
